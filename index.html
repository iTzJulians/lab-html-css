<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/495eba3641.js" crossorigin="anonymous"></script>
    <title>ID Card</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <article class="Card">
            <header>
                <h1 class="Empresa">DevGenn</h1>
                <img src="assets/_.jpeg" alt="" class="PFP">
                <div class="Profile">
                    <h1 class="Nombre"><strong>Julian Castellanos</strong></h1>
                    <p>Desarrollador de Software</p>
                    <p>Mi codigo funciona... No pregunten por qué</p>
                </div>
            </header>
            <section class="Informacion">
                <div class="Datos">


                    <p><i class="fa-solid fa-envelope"></i><span>fakeEmail@gmail.com</span></p>
                    <p><b>Hobby</b> <span>Crear videojuegos</span></p>
                    <p><i class="fa-solid fa-location-dot"></i> <span>Bogotá</span></p>
                    <p><i class="fa-solid fa-code"></i> <span>C#</span></p>

                </div>
                <div class=" Github">
                    <img src="assets/adobe-express-qr-code.png" alt="codigo QR GitHub" class="QR">
                    <i class="fa-brands fa-github"></i>
                    <a href="https://github.com/iTzJulians">iTzJulians</a>
                </div>
                







            </section>
        </article>

    </main>
</body>

</html>
