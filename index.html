<!DOCTYPE html>
<html lang="en">

<head>

    <title>ID Card</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <article class="Card">
            <header>
                <h1 class="Empresa">DevGenn</h1>
                <img src="assets/_.jpeg" alt="" class="PFP">

                    <p>Mi codigo funciona... No pregunten por qué</p>

                    <p>Tecnologia fav: <span>C#</span></p>
                    <p>Hobby: <span>Crear videojuegos</span></p>
                    <p>Correo: <span>olakease@gmail.com</span></p>
                    <img src="assets/adobe-express-qr-code.png" alt="codigo QR GitHub" class="GitHub">
                </div>

            </section>
        </article>

    </main>
</body>

</html>
